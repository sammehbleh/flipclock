<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<title>Flip Clock</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="theme-dark">
  <div class="app">
    <header class="topbar">
      <div class="brand">FLIP</div>

      <nav class="tabs" id="tabs">
        <button class="tab active" data-mode="clock">Clock</button>
        <button class="tab" data-mode="pomodoro">Pomodoro</button>
        <button class="tab" data-mode="timer">Timer</button>
        <button class="tab" data-mode="stopwatch">Stopwatch</button>
      </nav>

      <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.2" stroke="currentColor" stroke-width="1.6"/><path d="M12 2.5v2.4M12 19.1v2.4M4.2 4.2l1.7 1.7M18.1 18.1l1.7 1.7M2.5 12h2.4M19.1 12h2.4M4.2 19.8l1.7-1.7M18.1 5.9l1.7-1.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </header>

    <main class="stage">
      <div class="display" id="display"></div>

      <section class="panel" id="panel-pomodoro" hidden>
        <div class="pomo-status">
          <span class="pomo-phase" id="pomo-phase">FOCUS</span>
          <span class="pomo-session" id="pomo-session">Session 1 / 4</span>
        </div>
        <div class="controls">
          <button class="btn primary" id="pomo-toggle">Start</button>
          <button class="btn" id="pomo-skip">Skip</button>
          <button class="btn" id="pomo-reset">Reset</button>
        </div>
        <div class="settings-row" id="pomo-settings">
          <label>Focus<input type="number" id="pomo-focus" min="1" max="180" value="25" /></label>
          <label>Short break<input type="number" id="pomo-short" min="1" max="60" value="5" /></label>
          <label>Long break<input type="number" id="pomo-long" min="1" max="90" value="15" /></label>
          <label>Sessions<input type="number" id="pomo-sessions" min="1" max="12" value="4" /></label>
        </div>
      </section>

      <section class="panel" id="panel-timer" hidden>
        <div class="controls">
          <button class="btn primary" id="timer-toggle">Start</button>
          <button class="btn" id="timer-reset">Reset</button>
        </div>
        <div class="settings-row" id="timer-settings">
          <label>Hours<input type="number" id="timer-h" min="0" max="23" value="0" /></label>
          <label>Minutes<input type="number" id="timer-m" min="0" max="59" value="5" /></label>
          <label>Seconds<input type="number" id="timer-s" min="0" max="59" value="0" /></label>
        </div>
      </section>

      <section class="panel" id="panel-stopwatch" hidden>
        <div class="controls">
          <button class="btn primary" id="sw-toggle">Start</button>
          <button class="btn" id="sw-lap">Lap</button>
          <button class="btn" id="sw-reset">Reset</button>
        </div>
        <ul class="laps" id="sw-laps"></ul>
      </section>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
